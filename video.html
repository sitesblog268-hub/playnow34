<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - Video Hub Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background: #0f172a; color: white;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        .ad-container {
            width: 100%; height: 75px;
            background: #fff; display: flex;
            justify-content: center; align-items: center;
            z-index: 100;
        }
        .main-player {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            position: relative;
        }
        video {
            max-width: 100%;
            max-height: 75vh;
            background: #000;
        }
        .video-info {
            position: absolute; bottom: 0;
            width: 100%; padding: 15px;
            background: rgba(15, 23, 42, 0.8);
            text-align: center; font-size: 14px;
        }
        .close-btn {
            position: absolute; top: 15px; left: 15px;
            background: #f43f5e; color: white;
            border: none; padding: 10px 15px; border-radius: 8px;
            font-weight: bold; cursor: pointer; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = { 'key' : 'f2fb933435847a2a213752d43fcb220d', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script src="https://venisonglum.com/f2fb933435847a2a213752d43fcb220d/invoke.js"></script>
    </div>

    <div class="main-player">
        <button class="close-btn" onclick="window.close()">✖ TUTUP</button>
        
        <video id="vSource" controls autoplay playsinline>
            <source src="" type="video/mp4">
        </video>

        <div class="video-info" id="vTitle">Video Hub Pro</div>
    </div>

    <div class="ad-container">
        <script type="text/javascript">
            atOptions = { 'key' : 'd0bcd47cb69839ad4bbecb8848ecd4ef', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        </script>
        <script src="https://venisonglum.com/d0bcd47cb69839ad4bbecb8848ecd4ef/invoke.js"></script>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const vidUrl = urlParams.get('url');
        const vidTitle = urlParams.get('title');

        if (vidUrl) {
            const player = document.getElementById('vSource');
            player.querySelector('source').src = decodeURIComponent(vidUrl);
            player.load();
            document.getElementById('vTitle').innerText = decodeURIComponent(vidTitle || "Video Hub Pro");
            document.title = decodeURIComponent(vidTitle || "Playing Video...");
        }
    </script>
</body>
</html>
